services:
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    image: deadmin-php:8.2-fpm
    restart: unless-stopped
    environment:
      PHP_MEMORY_LIMIT: 512M
    volumes:
      - ./src:/var/www/html:cached
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - app-network
  app:
    # 一次性服务：在宿主 ./src 中创建 Laravel 12 项目（exec 形式）
    # build:
    #   context: ./php
    #   dockerfile: Dockerfile
    image: deadmin-php:8.2-fpm
    user: root
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./config:/tmp/config
    restart: "no"
    # 不使用 shell entrypoint，直接以 exec 形式运行 composer，避免引用问题
    entrypoint: ["bash","-lc"]
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      HOME: /tmp
    #command: ["composer","create-project","laravel/laravel",".","12.*","--prefer-dist","--no-interaction"]
    command: [
      #"composer create-project laravel/laravel . 12.* --prefer-dist --no-interaction && "
      #"composer","create-project","laravel/laravel",".","12.*","--prefer-dist","--no-interaction",
      "composer config -g repo.packagist composer https://mirrors.cloud.tencent.com/composer/ && composer create-project laravel/laravel . 12.* --prefer-dist --no-interaction && cp /tmp/config/.env .env && sed -i -E \"/'mysql'\\s*=>\\s*\\[/,/\\],/ s/'prefix'\\s*=>\\s*'[^']*'/'prefix' => 'la_'/\" ./config/database.php && echo 'prefix updated' && composer require echoyl/sa && php artisan deadmin:publish --force && php artisan vendor:publish --tag=sanctum-migrations && php artisan migrate && php artisan storage:link && chown -R www-data:www-data ./",
      # "&& chown -R www-data:www-data /var/www/html && php artisan key:generate --force",
      #"composer require echoyl/sa && php artisan deadmin:publish --force && php artisan vendor:publish --tag=sanctum-migrations && php artisan migrate && php artisan storage:link && chmod -R +777 ./storage",
    ]
    networks:
      - app-network
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app-network
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata: